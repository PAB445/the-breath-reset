<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1480" role="img" aria-labelledby="sheetTitle">
  <title id="sheetTitle">The Breath Reset  fresh logo ideas</title>
  <defs>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F6E8D2"/>
      <stop offset=".52" stop-color="#AFC0A6"/>
      <stop offset="1" stop-color="#D19073"/>
    </linearGradient>
    <linearGradient id="warmFlat" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#AFC0A6"/>
      <stop offset="1" stop-color="#D19073"/>
    </linearGradient>
    <radialGradient id="orbGlow" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#F6E8D2"/>
      <stop offset=".55" stop-color="#AFC0A6"/>
      <stop offset="1" stop-color="#5F745E"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#202721" flood-opacity=".16"/>
    </filter>
    <style>
      .bg { fill: #F8F1E8; }
      .panel { fill: #FFFAF3; stroke: rgba(32,39,33,.10); stroke-width: 1; }
      .cream { stroke: #F8F1E8; }
      .clay  { stroke: #D19073; }
      .sage  { stroke: #8FA58A; }
      .rule  { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .eyebrow { fill: #5F745E; font-family: Manrope, Inter, Arial, sans-serif; font-size: 19px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
      .h1 { fill: #202721; font-family: 'Instrument Serif', Georgia, serif; font-style: italic; font-size: 64px; }
      .label { fill: #202721; font-family: Manrope, Inter, Arial, sans-serif; font-size: 27px; font-weight: 750; }
      .small { fill: rgba(32,39,33,.66); font-family: Manrope, Inter, Arial, sans-serif; font-size: 17px; font-weight: 500; }
      .wordSerif { fill: #202721; font-family: 'Instrument Serif', Georgia, serif; font-style: italic; }
      .wordSans { fill: #202721; font-family: Manrope, Inter, Arial, sans-serif; font-weight: 800; letter-spacing: -.01em; }
      .wordLight { fill: #F8F1E8; }
      .footnote { fill: rgba(32,39,33,.6); font-family: Manrope, Inter, Arial, sans-serif; font-size: 18px; font-weight: 500; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1480"/>

  <!-- Header -->
  <text x="84" y="96" class="eyebrow">Guided breathwork with Suraj</text>
  <text x="82" y="158" class="h1">The Breath Reset  logo ideas</text>
  <text x="84" y="196" class="small">Six fresh marks built from the site palette and type. Each shown on charcoal and on cream.</text>

  <!-- ============ ROW 1 ============ -->

  <!-- 1. Breath Arc -->
  <g transform="translate(80 250)">
    <rect class="panel" width="440" height="380" rx="28" filter="url(#shadow)"/>
    <g transform="translate(150 50)">
      <circle cx="70" cy="70" r="70" fill="#202721"/>
      <path d="M30 70a40 40 0 0 1 80 0" class="rule" stroke="url(#warm)" stroke-width="7"/>
      <path d="M40 70a30 30 0 0 1 60 0" class="rule cream" stroke-width="5.5" opacity=".7"/>
      <path d="M50 70a20 20 0 0 1 40 0" class="rule clay" stroke-width="5"/>
      <circle cx="70" cy="70" r="4.5" fill="#F8F1E8"/>
    </g>
    <text x="42" y="258" class="label">Breath Arc</text>
    <text x="42" y="292" class="small">Expanding rings = the inhale opening up.</text>
    <text x="42" y="318" class="small">Calm, premium, reads at favicon size.</text>
  </g>

  <!-- 2. EnsM Reset -->
  <g transform="translate(580 250)">
    <rect class="panel" width="440" height="380" rx="28" filter="url(#shadow)"/>
    <g transform="translate(150 50)">
      <circle cx="70" cy="70" r="70" fill="#202721"/>
      <path d="M98 38a44 44 0 1 0 16 30" class="rule" stroke="url(#warm)" stroke-width="8.5"/>
      <circle cx="112" cy="44" r="6.5" fill="#D19073"/>
    </g>
    <text x="42" y="258" class="label">EnsM Reset</text>
    <text x="42" y="292" class="small">A zen ring with a deliberate open gap.</text>
    <text x="42" y="318" class="small">Meditative, editorial, very ownable.</text>
  </g>

  <!-- 3. Settling Wave -->
  <g transform="translate(1080 250)">
    <rect class="panel" width="440" height="380" rx="28" filter="url(#shadow)"/>
    <g transform="translate(150 50)">
      <circle cx="70" cy="70" r="70" fill="#202721"/>
      <path d="M24 50c11-20 23-20 34 0s23 20 34 0" class="rule" stroke="url(#warm)" stroke-width="6.5"/>
      <path d="M28 72c10-14 21-14 31 0s21 14 31 0" class="rule cream" stroke-width="5.5" opacity=".78"/>
      <path d="M34 92c8-8 16-8 24 0s16 8 24 0" class="rule clay" stroke-width="5"/>
    </g>
    <text x="42" y="258" class="label">Settling Wave</text>
    <text x="42" y="292" class="small">Three waves calming from big to small.</text>
    <text x="42" y="318" class="small">Literally shows the nervous system settling.</text>
  </g>

  <!-- ============ ROW 2 ============ -->

  <!-- 4. Bloom / Lungs -->
  <g transform="translate(80 670)">
    <rect class="panel" width="440" height="380" rx="28" filter="url(#shadow)"/>
    <g transform="translate(150 50)">
      <circle cx="70" cy="70" r="70" fill="#202721"/>
      <path d="M70 104c-26-6-34-30-30-52 18-2 34 8 30 34" fill="none" stroke="url(#warm)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M70 104c26-6 34-30 30-52-18-2-34 8-30 34" fill="none" stroke="#D19073" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M70 104V70" class="rule cream" stroke-width="4.5" opacity=".7"/>
    </g>
    <text x="42" y="258" class="label">Breath Bloom</text>
    <text x="42" y="292" class="small">Two leaves / lungs opening from a stem.</text>
    <text x="42" y="318" class="small">Somatic, organic, warm and human.</text>
  </g>

  <!-- 5. Orbit Dot (echoes hero breath-orbit) -->
  <g transform="translate(580 670)">
    <rect class="panel" width="440" height="380" rx="28" filter="url(#shadow)"/>
    <g transform="translate(150 50)">
      <circle cx="70" cy="70" r="70" fill="#202721"/>
      <circle cx="70" cy="70" r="40" fill="none" stroke="url(#warm)" stroke-width="3"/>
      <circle cx="70" cy="70" r="20" fill="url(#orbGlow)"/>
      <circle cx="70" cy="30" r="6.5" fill="#D19073"/>
    </g>
    <text x="42" y="258" class="label">Orbit</text>
    <text x="42" y="292" class="small">Mirrors the hero's breathing orbit motif.</text>
    <text x="42" y="318" class="small">Animates beautifully; great for socials.</text>
  </g>

  <!-- 6. Monogram br -->
  <g transform="translate(1080 670)">
    <rect class="panel" width="440" height="380" rx="28" filter="url(#shadow)"/>
    <g transform="translate(150 50)">
      <circle cx="70" cy="70" r="70" fill="#202721"/>
      <path d="M46 34v72" class="rule" stroke="url(#warm)" stroke-width="8"/>
      <path d="M46 64c6-14 18-20 30-14s14 20 4 30c-9 9-24 8-34-4" class="rule cream" stroke-width="7.5"/>
      <path d="M86 78c6-8 14-10 22-6" class="rule clay" stroke-width="7.5"/>
    </g>
    <text x="42" y="258" class="label">Monogram br</text>
    <text x="42" y="292" class="small">Lowercase mark with a breath curve.</text>
    <text x="42" y="318" class="small">Distinctive when type alone feels plain.</text>
  </g>

  <!-- ============ WORDMARK LOCKUPS ============ -->
  <text x="84" y="1138" class="eyebrow">Wordmark lockups</text>

  <!-- Lockup A: dark bar, serif -->
  <g transform="translate(80 1170)">
    <rect width="700" height="190" rx="24" fill="#202721" filter="url(#shadow)"/>
    <g transform="translate(54 95)">
      <circle cx="0" cy="0" r="44" fill="#1A201B"/>
      <path d="M-26 0a26 26 0 0 1 52 0" class="rule" stroke="url(#warm)" stroke-width="5"/>
      <path d="M-17 0a17 17 0 0 1 34 0" class="rule clay" stroke-width="4.5"/>
      <circle cx="0" cy="0" r="3" fill="#F8F1E8"/>
    </g>
    <text x="126" y="86" class="wordSerif wordLight" font-size="54">The Breath</text>
    <text x="126" y="146" class="wordSans wordLight" font-size="40">RESET</text>
  </g>

  <!-- Lockup B: light, horizontal sans + serif -->
  <g transform="translate(820 1170)">
    <rect class="panel" width="700" height="190" rx="24" filter="url(#shadow)"/>
    <g transform="translate(64 95)">
      <circle cx="0" cy="0" r="48" fill="#202721"/>
      <path d="M-30 -8c8-12 17-12 25 0s17 12 25 0" class="rule" stroke="url(#warm)" stroke-width="5"/>
      <path d="M14 -14l11 11-11 11" class="rule clay" stroke-width="5"/>
    </g>
    <text x="138" y="92" class="wordSerif" font-size="58">The Breath</text>
    <text x="138" y="146" class="wordSans" font-size="34" letter-spacing=".26em">R E S E T</text>
  </g>

  <text x="84" y="1430" class="footnote">Recommendation: Breath Arc or Settling Wave for the primary mark; EnsM Reset if you want something more premium and editorial.</text>
</svg>
